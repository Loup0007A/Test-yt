<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recherche YouTube par nom</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        input {
            padding: 8px;
            width: 300px;
        }
        button {
            padding: 8px 16px;
            background-color: #ff0000;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #cc0000;
        }
        #video-container {
            margin-top: 20px;
        }
        iframe {
            width: 560px;
            height: 315px;
            border: none;
        }
        #results {
            margin-top: 20px;
            text-align: left;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .video-result {
            padding: 10px;
            border: 1px solid #ddd;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .video-result:hover {
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>
    <h1>Rechercher une vidéo YouTube</h1>
    <p>Entrez le nom de la vidéo :</p>
    <input type="text" id="video-query" placeholder="Nom de la vidéo">
    <button onclick="searchVideo()">Rechercher</button>

    <div id="results"></div>
    <div id="video-container"></div>

    <script>
        const API_KEY = "AIzaSyCGjzaB5AeXvH5Xbx4QCiZsImKsmXGxu2M"; // Remplace par ta clé API YouTube

        async function searchVideo() {
            const query = document.getElementById('video-query').value.trim();
            const resultsContainer = document.getElementById('results');
            const videoContainer = document.getElementById('video-container');

            if (!query) {
                resultsContainer.innerHTML = "<p>Veuillez entrer un nom de vidéo.</p>";
                return;
            }

            try {
                const response = await fetch(
                    `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&type=video&maxResults=5&key=${API_KEY}`
                );
                const data = await response.json();

                if (data.items && data.items.length > 0) {
                    resultsContainer.innerHTML = "<h3>Résultats :</h3>";
                    data.items.forEach(item => {
                        const videoId = item.id.videoId;
                        const title = item.snippet.title;
                        const thumbnail = item.snippet.thumbnails.default.url;

                        const resultElement = document.createElement('div');
                        resultElement.className = 'video-result';
                        resultElement.innerHTML = `
                            <img src="${thumbnail}" alt="${title}" width="100">
                            <strong>${title}</strong>
                        `;
                        resultElement.onclick = () => loadVideo(videoId);
                        resultsContainer.appendChild(resultElement);
                    });
                } else {
                    resultsContainer.innerHTML = "<p>Aucune vidéo trouvée.</p>";
                }
            } catch (error) {
                resultsContainer.innerHTML = `<p>Erreur : ${error.message}</p>`;
            }
        }

        function loadVideo(videoId) {
            const videoContainer = document.getElementById('video-container');
            videoContainer.innerHTML = `
                <iframe
                    src="https://www.youtube.com/embed/${videoId}?autoplay=1"
                    allowfullscreen>
                </iframe>
            `;
        }
    </script>
</body>
</html>
