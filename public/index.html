        // ==================== ONGLET SHORTS ====================

        function buildShortEmbedUrl(videoId, muted) {
            return `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=${muted ? 1 : 0}&loop=1&playlist=${videoId}&controls=1&modestbranding=1&rel=0&playsinline=1`;
        }

        function setupShortsObserver() {
            shortsObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const el = entry.target;
                    if (entry.isIntersecting && entry.intersectionRatio > 0.6) {
                        if (!el.querySelector('iframe')) {
                            const muted = el.dataset.muted !== 'false';
                            const placeholder = el.querySelector('.short-loading');
                            if (placeholder) placeholder.remove();
                            const iframe = document.createElement('iframe');
                            iframe.setAttribute('allow', 'autoplay; encrypted-media; picture-in-picture');
                            iframe.src = buildShortEmbedUrl(el.dataset.videoId, muted);
                            el.prepend(iframe);
                            // Démarre le chronométrage du temps de visionnage pour cette vidéo
                            el.dataset.watchStart = Date.now().toString();
                        }
                        // Charge la page suivante quand on approche de la fin du flux (fonctionne même
                        // s'il reste très peu d'éléments, contrairement à une comparaison stricte au 3e avant la fin)
                        const allItems = Array.from(document.querySelectorAll('#shorts-feed .short-item'));
                        const idx = allItems.indexOf(el);
                        if (idx !== -1 && idx >= allItems.length - 3 && shortsPageToken) {
                            loadShorts(true);
                        }
                    } else {
                        const iframe = el.querySelector('iframe');
                        if (iframe) iframe.remove();
                        if (!el.querySelector('.short-loading')) {
                            const ph = document.createElement('div');
                            ph.className = 'short-loading';
                            el.prepend(ph);
                        }
                        // Fin de visionnage : on envoie le temps réellement passé sur ce Short
                        if (el.dataset.watchStart) {
                            const watchSeconds = (Date.now() - parseInt(el.dataset.watchStart, 10)) / 1000;
                            delete el.dataset.watchStart;
                            if (watchSeconds > 0.5) sendShortViewEvent(el, watchSeconds);

                            // Détection de skip rapide : plusieurs Shorts quittés en 3s ou moins d'affilée
                            // => le sujet actuel ne plaît visiblement pas, on change complètement de répertoire.
                            if (watchSeconds <= SHORTS_SKIP_SECONDS_THRESHOLD) {
                                shortsConsecutiveSkips++;
                                if (shortsConsecutiveSkips >= SHORTS_SKIP_STREAK_THRESHOLD) {
                                    shortsConsecutiveSkips = 0;
                                    triggerShortsTopicReset();
                                }
                            } else {
                                shortsConsecutiveSkips = 0;
                            }
                        }
                    }
                });
            }, { root: document.getElementById('shorts-feed'), threshold: [0, 0.6, 1] });
        }

        // Envoie au serveur le temps passé sur un Short, pour alimenter l'algorithme de personnalisation
        // (temps de visionnage rapporté à la durée totale + chaîne/tags), sans jamais bloquer l'UX en cas d'échec.
        function sendShortViewEvent(el, watchSeconds) {
            const payload = {
                fingerprint: deviceFingerprint,
                videoId: el.dataset.videoId,
                channelId: el.dataset.channelId || null,
                channelTitle: el.dataset.channelTitle || null,
                categoryId: el.dataset.categoryId || null,
                tags: el.dataset.tags ? JSON.parse(el.dataset.tags) : [],
                watchSeconds: Math.round(watchSeconds * 10) / 10,
                totalDuration: parseFloat(el.dataset.totalDuration) || null
            };
            try {
                const body = JSON.stringify(payload);
                if (navigator.sendBeacon) {
                    const blob = new Blob([body], { type: 'application/json' });
                    navigator.sendBeacon('/api/shorts/view', blob);
                } else {
                    fetch('/api/shorts/view', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body,
                        keepalive: true
                    });
                }
            } catch (e) {
                // Le tracking ne doit jamais casser l'expérience utilisateur
            }
        }

        // Filet de sécurité : si l'utilisateur quitte la page pendant qu'un Short est en cours de visionnage
        window.addEventListener('beforeunload', () => {
            const activeItem = document.querySelector('#shorts-feed .short-item[data-watch-start]');
            if (activeItem) {
                const watchSeconds = (Date.now() - parseInt(activeItem.dataset.watchStart, 10)) / 1000;
                if (watchSeconds > 0.5) sendShortViewEvent(activeItem, watchSeconds);
            }
        });

        // Choisit une nouvelle catégorie de contenu, différente de la précédente
        function pickNewShortsCategory() {
            const options = SHORTS_CATEGORY_POOL.filter(c => c !== lastShortsCategory);
            const pick = options[Math.floor(Math.random() * options.length)];
            lastShortsCategory = pick;
            return pick;
        }

        // Change complètement de répertoire de contenu : nouvelle catégorie, flux entièrement rechargé
        function triggerShortsTopicReset() {
            const newCategory = pickNewShortsCategory();
            currentShortsQuery = newCategory;
            shortsPageToken = null;
            const input = document.getElementById('shorts-query');
            if (input) input.value = newCategory;
            showShortsToast(`On change de contenu : ${newCategory} 🔄`);
            loadShorts(false);
        }

        function showShortsToast(message) {
            const feed = document.getElementById('shorts-feed');
            let toast = document.getElementById('shorts-toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'shorts-toast';
                feed.appendChild(toast);
            }
            toast.textContent = message;
            toast.classList.add('visible');
            clearTimeout(toast._hideTimeout);
            toast._hideTimeout = setTimeout(() => toast.classList.remove('visible'), 2500);
        }

        function buildShortItem(item) {
            const videoId = item.id.videoId;
            const title = item.snippet.title;
            const channelTitle = item.snippet.channelTitle;
            const channelId = item.snippet.channelId;
            const views = item.statistics ? formatNumber(item.statistics.viewCount) : null;
            const likes = item.statistics ? formatNumber(item.statistics.likeCount) : '';
            const comments = item.statistics ? formatNumber(item.statistics.commentCount) : '';
            const totalSeconds = item.contentDetails ? parseDurationSeconds(item.contentDetails.duration) : 0;

            const el = document.createElement('div');
            el.className = 'short-item';
            el.dataset.videoId = videoId;
            el.dataset.muted = 'true';
            el.dataset.channelId = channelId || '';
            el.dataset.channelTitle = channelTitle || '';
            el.dataset.categoryId = item.categoryId || '';
            el.dataset.tags = JSON.stringify(item.tags || []);
            el.dataset.totalDuration = totalSeconds;
            el.innerHTML = `
                <div class="short-loading">Chargement...</div>
                <div class="short-overlay">
                    <div class="short-channel" data-channel-id="${channelId}">@${escapeHtml(channelTitle)}</div>
                    <div class="short-title">${escapeHtml(title)}</div>
                    <div class="short-meta">${views ? views + ' vues' : ''}</div>
                </div>
                <div class="short-side-actions">
                    <button class="short-action-btn" data-role="like" title="J'aime">👍<span class="count">${likes}</span></button>
                    <button class="short-action-btn" data-role="comments" title="Commentaires">💬<span class="count">${comments}</span></button>
                    <button class="short-action-btn" data-role="mute" title="Son">🔇</button>
                </div>
            `;
            el.querySelector('.short-channel').onclick = (e) => { e.stopPropagation(); openChannel(channelId); };
            el.querySelector('[data-role="comments"]').onclick = (e) => { e.stopPropagation(); openShortComments(videoId); };
            el.querySelector('[data-role="mute"]').onclick = (e) => {
                e.stopPropagation();
                toggleShortMute(el);
            };
            // Le bouton "J'aime" est indicatif : l'API publique YouTube ne permet pas de liker sans authentification utilisateur
            el.querySelector('[data-role="like"]').onclick = (e) => e.stopPropagation();

            if (shortsObserver) shortsObserver.observe(el);
            return el;
        }

        function toggleShortMute(el) {
            const iframe = el.querySelector('iframe');
            const btn = el.querySelector('[data-role="mute"]');
            const nowMuted = el.dataset.muted !== 'true'; // on inverse l'état actuel
            el.dataset.muted = nowMuted ? 'true' : 'false';
            if (iframe) {
                iframe.src = buildShortEmbedUrl(el.dataset.videoId, nowMuted);
            }
            btn.textContent = nowMuted ? '🔇' : '🔊';
        }

        async function loadShorts(append) {
            if (shortsLoadingMore) return;
            shortsLoadingMore = true;
            const feed = document.getElementById('shorts-feed');
            if (!append) feed.innerHTML = "<div class='short-loading'>Chargement des Shorts...</div>";

            try {
                const params = new URLSearchParams({});
                if (currentShortsQuery) params.set('q', currentShortsQuery);
                if (shortsPageToken) params.set('pageToken', shortsPageToken);
                if (deviceFingerprint) params.set('fp', deviceFingerprint);

                const res = await fetch(`/api/shorts?${params.toString()}`);
                const data = await res.json();

                if (!append) feed.innerHTML = '';

                if (data.items && data.items.length > 0) {
                    data.items.forEach(item => feed.appendChild(buildShortItem(item)));
                } else if (!append) {
                    feed.innerHTML = "<div class='short-loading'>Aucun Short trouvé.</div>";
                }

                shortsPageToken = data.nextPageToken || null;

                const badge = document.getElementById('shorts-region-badge');
                if (badge) {
                    badge.textContent = data.region ? `📍 Contenus localisés : ${data.region}` : '';
                }
            } catch (error) {
                if (!append) feed.innerHTML = "<div class='short-loading'>Erreur de chargement.</div>";
            } finally {
                shortsLoadingMore = false;
            }
        }

        function newShortsSearch() {
            const q = document.getElementById('shorts-query').value.trim();
            currentShortsQuery = q;
            shortsPageToken = null;
            loadShorts(false);
        }

        async function openShortComments(videoId) {
            const panel = document.getElementById('short-comments-panel');
            const list = document.getElementById('short-comments-list');
            list.innerHTML = "<p class='status-msg'>Chargement...</p>";
            panel.classList.add('open');

            try {
                const res = await fetch(`/api/comments?videoId=${encodeURIComponent(videoId)}`);
                const data = await res.json();

                if (data.commentsDisabled) {
                    list.innerHTML = "<p class='status-msg'>Les commentaires sont désactivés pour ce Short.</p>";
                    return;
                }

                list.innerHTML = '';
                if (data.items && data.items.length > 0) {
                    data.items.forEach(item => {
                        const c = item.snippet.topLevelComment.snippet;
                        const el = document.createElement('div');
                        el.className = 'comment-item';
                        el.innerHTML = `
                            <img src="${c.authorProfileImageUrl}" alt="">
                            <div>
                                <div class="comment-author">${escapeHtml(c.authorDisplayName)}<span class="comment-date">${formatDate(c.publishedAt)}</span></div>
                                <div class="comment-text">${escapeHtml(c.textDisplay)}</div>
                                <div class="comment-likes">👍 ${formatNumber(c.likeCount)}</div>
                            </div>
                        `;
                        list.appendChild(el);
                    });
                } else {
                    list.innerHTML = "<p class='status-msg'>Aucun commentaire.</p>";
                }
            } catch (error) {
                list.innerHTML = "<p class='status-msg'>Erreur lors du chargement des commentaires.</p>";
            }
        }

        function closeShortComments() {
            document.getElementById('short-comments-panel').classList.remove('open');
        }

        // ==================== ONGLET MUSIC ====================

        function setMusicSearchType(type) {
            musicSearchState.type = type;
            musicSearchState.pageToken = null;
            document.getElementById('music-type-track').classList.toggle('active', type === 'video');
            document.getElementById('music-type-playlist').classList.toggle('active', type === 'playlist');
            document.getElementById('music-type-artist').classList.toggle('active', type === 'channel');
            if (musicSearchState.q) runMusicSearch(false);
        }

        function newMusicSearch() {
            const q = document.getElementById('music-query').value.trim();
            musicSearchState.q = q;
            musicSearchState.pageToken = null;
            document.getElementById('music-recommendations-section').style.display = 'none';
            runMusicSearch(false);
        }

        function buildMusicResultItem(item, type) {
            const el = document.createElement('div');
            el.className = 'music-result-item';

            if (type === 'video') {
                const videoId = item.id.videoId;
                const title = item.snippet.title;
                const channelTitle = item.snippet.channelTitle;
                const thumbnail = item.snippet.thumbnails.medium ? item.snippet.thumbnails.medium.url : item.snippet.thumbnails.default.url;
                el.dataset.videoId = videoId;
                el.innerHTML = `
                    <img src="${thumbnail}" alt="${escapeHtml(title)}">
                    <div class="mri-info">
                        <div class="mri-title">${escapeHtml(title)}</div>
                        <div class="mri-sub">${escapeHtml(channelTitle)}</div>
                    </div>
                    <div class="mri-play-icon">▶️</div>
                `;
                el.onclick = () => playMusicFromResults(videoId);
            } else if (type === 'playlist') {
                const playlistId = item.id.playlistId;
                const title = item.snippet.title;
                const channelTitle = item.snippet.channelTitle;
                const thumbnail = item.snippet.thumbnails.medium ? item.snippet.thumbnails.medium.url : item.snippet.thumbnails.default.url;
                const count = item.contentDetails ? item.contentDetails.itemCount : null;
                el.innerHTML = `
                    <img src="${thumbnail}" alt="${escapeHtml(title)}">
                    <div class="mri-info">
                        <div class="mri-title">${escapeHtml(title)}</div>
                        <div class="mri-sub">${escapeHtml(channelTitle)}${count !== null ? ' • ' + count + ' titres' : ''}</div>
                    </div>
                    <div class="mri-play-icon">📃</div>
                `;
                el.onclick = () => playMusicPlaylist(playlistId);
            } else {
                const channelId = item.id.channelId;
                const title = item.snippet.title;
                const thumbnail = item.snippet.thumbnails.medium ? item.snippet.thumbnails.medium.url : item.snippet.thumbnails.default.url;
                el.innerHTML = `
                    <img src="${thumbnail}" alt="${escapeHtml(title)}" style="border-radius:50%;">
                    <div class="mri-info">
                        <div class="mri-title">${escapeHtml(title)}</div>
                        <div class="mri-sub">Chaîne / Artiste</div>
                    </div>
                    <div class="mri-play-icon">›</div>
                `;
                el.onclick = () => openChannel(channelId);
            }
            return el;
        }

        async function runMusicSearch(append) {
            const container = document.getElementById('music-results');
            const loadMoreWrapper = document.getElementById('music-load-more-wrapper');

            if (!musicSearchState.q) {
                container.innerHTML = "<p class='status-msg'>Recherchez un titre, un artiste ou une playlist musicale.</p>";
                loadMoreWrapper.innerHTML = '';
                return;
            }
            if (!append) container.innerHTML = "<p class='status-msg'>Recherche en cours...</p>";

            try {
                const params = new URLSearchParams({
                    q: musicSearchState.q,
                    type: musicSearchState.type,
                    order: 'relevance',
                    music: 'true'
                });
                if (musicSearchState.pageToken) params.set('pageToken', musicSearchState.pageToken);

                const res = await fetch(`/api/search?${params.toString()}`);
                const data = await res.json();

                if (!append) container.innerHTML = '';

                if (data.items && data.items.length > 0) {
                    data.items.forEach(item => container.appendChild(buildMusicResultItem(item, musicSearchState.type)));
                } else if (!append) {
                    container.innerHTML = "<p class='status-msg'>Aucun résultat trouvé.</p>";
                }

                markPlayingMusicItem();

                musicSearchState.pageToken = data.nextPageToken || null;
                loadMoreWrapper.innerHTML = '';
                if (musicSearchState.pageToken) {
                    const btn = document.createElement('button');
                    btn.className = 'voir-plus-btn';
                    btn.textContent = 'Voir plus';
                    btn.onclick = () => runMusicSearch(true);
                    loadMoreWrapper.appendChild(btn);
                }
            } catch (error) {
                container.innerHTML = "<p class='status-msg'>Erreur lors de la recherche.</p>";
            }
        }

        function playMusicFromResults(videoId) {
            const items = Array.from(document.querySelectorAll('#music-zone .music-result-item[data-video-id]'));
            const queue = items.map(el => ({
                videoId: el.dataset.videoId,
                title: el.querySelector('.mri-title').textContent,
                channelTitle: el.querySelector('.mri-sub').textContent,
                thumbnail: el.querySelector('img').src
            }));
            const index = queue.findIndex(t => t.videoId === videoId);
            startMusicQueue(queue, index >= 0 ? index : 0);
        }

        async function playMusicPlaylist(playlistId) {
            try {
                const res = await fetch(`/api/playlist?id=${encodeURIComponent(playlistId)}`);
                const data = await res.json();
                if (!data.items || data.items.length === 0) return;
                const queue = data.items.map(item => ({
                    videoId: item.snippet.resourceId.videoId,
                    title: item.snippet.title,
                    channelTitle: item.snippet.videoOwnerChannelTitle || item.snippet.channelTitle || '',
                    thumbnail: item.snippet.thumbnails && item.snippet.thumbnails.medium
                        ? item.snippet.thumbnails.medium.url
                        : (item.snippet.thumbnails ? item.snippet.thumbnails.default.url : '')
                }));
                startMusicQueue(queue, 0);
            } catch (error) {
                console.error('Erreur lors du chargement de la playlist musicale', error);
            }
        }

        // ---------- Moteur du lecteur musique (YouTube IFrame API) ----------
        function onYouTubeIframeAPIReady() {
            ytMusicPlayer = new YT.Player('yt-music-player', {
                height: '1',
                width: '1',
                playerVars: { playsinline: 1, controls: 0 },
                events: {
                    onReady: () => {
                        ytMusicPlayerReady = true;
                        if (musicPendingVideoId) {
                            ytMusicPlayer.loadVideoById(musicPendingVideoId);
                            musicPendingVideoId = null;
                        }
                    },
                    onStateChange: onMusicPlayerStateChange
                }
            });
        }

        function onMusicPlayerStateChange(event) {
            const playBtn = document.getElementById('bp-play-btn');
            if (event.data === YT.PlayerState.PLAYING) {
                playBtn.textContent = '⏸️';
                startProgressPolling();
            } else if (event.data === YT.PlayerState.PAUSED) {
                playBtn.textContent = '▶️';
                stopProgressPolling();
            } else if (event.data === YT.PlayerState.ENDED) {
                // Enchaînement automatique sur la piste suivante
                musicPlayNext();
            }
        }

        function startMusicQueue(queue, index) {
            musicQueue = queue;
            musicQueueIndex = index;
            loadCurrentMusicTrack();
        }

        function loadCurrentMusicTrack() {
            const track = musicQueue[musicQueueIndex];
            if (!track) return;

            document.getElementById('bp-thumb').src = track.thumbnail || '';
            document.getElementById('bp-title').textContent = decodeHtmlEntities(track.title);
            document.getElementById('bp-channel').textContent = decodeHtmlEntities(track.channelTitle || '');
            document.getElementById('bottom-player-bar').classList.add('visible');
            document.getElementById('bp-play-btn').textContent = '⏸️';

            markPlayingMusicItem();

            if (ytMusicPlayerReady && ytMusicPlayer) {
                ytMusicPlayer.loadVideoById(track.videoId);
            } else {
                musicPendingVideoId = track.videoId;
            }
        }

        function markPlayingMusicItem() {
            document.querySelectorAll('.music-result-item').forEach(el => el.classList.remove('playing'));
            const track = musicQueue[musicQueueIndex];
            if (!track) return;
            const activeEl = document.querySelector(`.music-result-item[data-video-id="${track.videoId}"]`);
            if (activeEl) activeEl.classList.add('playing');
        }

        function musicPlayNext() {
            if (musicQueueIndex < musicQueue.length - 1) {
                musicQueueIndex++;
                loadCurrentMusicTrack();
            }
        }

        function musicPlayPrev() {
            if (musicQueueIndex > 0) {
                musicQueueIndex--;
                loadCurrentMusicTrack();
            }
        }

        function toggleMusicPlayPause() {
            if (!ytMusicPlayer || !ytMusicPlayerReady) return;
            const state = ytMusicPlayer.getPlayerState();
            if (state === YT.PlayerState.PLAYING) {
                ytMusicPlayer.pauseVideo();
            } else {
                ytMusicPlayer.playVideo();
            }
        }

        function closeMusicPlayer() {
            if (ytMusicPlayer && ytMusicPlayerReady) ytMusicPlayer.stopVideo();
            document.getElementById('bottom-player-bar').classList.remove('visible');
            musicQueue = [];
            musicQueueIndex = -1;
            stopProgressPolling();
            document.querySelectorAll('.music-result-item').forEach(el => el.classList.remove('playing'));
        }

        function formatTime(sec) {
            sec = Math.floor(sec || 0);
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function startProgressPolling() {
            stopProgressPolling();
            musicProgressInterval = setInterval(() => {
                if (!ytMusicPlayer || !ytMusicPlayer.getDuration) return;
                const duration = ytMusicPlayer.getDuration() || 0;
                const current = ytMusicPlayer.getCurrentTime() || 0;
                const seek = document.getElementById('bp-seek');
                if (seek.dataset.dragging !== 'true') {
                    seek.value = duration ? (current / duration) * 100 : 0;
                }
                document.getElementById('bp-time').textContent = `${formatTime(current)} / ${formatTime(duration)}`;
            }, 500);
        }

        function stopProgressPolling() {
            if (musicProgressInterval) clearInterval(musicProgressInterval);
            musicProgressInterval = null;
        }

        const bpSeekEl = document.getElementById('bp-seek');
        bpSeekEl.addEventListener('input', () => { bpSeekEl.dataset.dragging = 'true'; });
        bpSeekEl.addEventListener('change', () => {
            if (ytMusicPlayer && ytMusicPlayer.getDuration) {
                const duration = ytMusicPlayer.getDuration() || 0;
                ytMusicPlayer.seekTo((bpSeekEl.value / 100) * duration, true);
            }
            delete bpSeekEl.dataset.dragging;
        });

        // ==================== RECOMMANDATIONS (sous les barres de recherche) ====================
        // Réutilisent le même moteur de scoring que les Shorts (langue/localisation, engagement,
        // ressemblance avec l'historique, bonus petites chaînes, pénalité si déjà skip). Chargées une
        // seule fois au démarrage ; masquées dès que l'utilisateur effectue une recherche explicite.

        async function loadRecommendations() {
            const section = document.getElementById('recommendations-section');
            const container = document.getElementById('recommendations-results');
            container.innerHTML = "<p class='status-msg'>Chargement des recommandations...</p>";
            try {
                const params = new URLSearchParams({ music: 'false' });
                if (deviceFingerprint) params.set('fp', deviceFingerprint);
                const res = await fetch(`/api/recommendations?${params.toString()}`);
                const data = await res.json();
                container.innerHTML = '';
                if (data.items && data.items.length > 0) {
                    data.items.forEach(item => container.appendChild(buildVideoResult(item)));
                } else {
                    section.style.display = 'none';
                }
            } catch (error) {
                section.style.display = 'none';
            }
        }

        async function loadMusicRecommendations() {
            const section = document.getElementById('music-recommendations-section');
            const container = document.getElementById('music-recommendations-results');
            container.innerHTML = "<p class='status-msg'>Chargement des recommandations...</p>";
            try {
                const params = new URLSearchParams({ music: 'true' });
                if (deviceFingerprint) params.set('fp', deviceFingerprint);
                const res = await fetch(`/api/recommendations?${params.toString()}`);
                const data = await res.json();
                container.innerHTML = '';
                if (data.items && data.items.length > 0) {
                    data.items.forEach(item => container.appendChild(buildMusicResultItem(item, 'video')));
                } else {
                    section.style.display = 'none';
                }
            } catch (error) {
                section.style.display = 'none';
            }
        }

        loadRecommendations();
        loadMusicRecommendations();
    </script>
</body>
