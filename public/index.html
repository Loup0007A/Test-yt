<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recherche YouTube Premium</title>
    <style>
        /* Variables de design (Style YouTube Dark) */
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #212121;
            --text-color: #f1f1f1;
            --text-secondary: #aaa;
            --yt-red: #ff0000;
            --yt-red-hover: #cc0000;
            --input-bg: #121212;
            --border-color: #303030;
        }

        body {
            font-family: 'Roboto', 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .search-container {
            display: flex;
            width: 100%;
            max-width: 600px;
            margin: 20px 0 30px 0;
            border: 1px solid var(--border-color);
            border-radius: 40px;
            overflow: hidden;
            background-color: var(--input-bg);
        }

        input {
            flex: 1;
            padding: 12px 20px;
            background: transparent;
            border: none;
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
        }

        button {
            padding: 0 24px;
            background-color: var(--border-color);
            color: var(--text-color);
            border: none;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
            border-left: 1px solid var(--border-color);
        }

        button:hover {
            background-color: #3f3f3f;
        }

        /* Conteneur Lecteur Vidéo dynamique */
        #video-container {
            width: 100%;
            max-width: 800px;
            margin-bottom: 30px;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Ratio 16:9 */
            height: 0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Grille de résultats */
        #results {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            padding: 10px;
        }

        .video-result {
            background-color: transparent;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            display: flex;
            flex-direction: column;
        }

        .video-result:hover {
            transform: scale(1.03);
        }

        .video-result img {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            border-radius: 10px;
            background-color: #000;
        }

        .video-info {
            padding: 10px 5px;
        }

        .video-title {
            font-size: 0.95rem;
            font-weight: 500;
            line-height: 1.3rem;
            display: -webkit-box;
            -webkit-line-clamp: 2; /* Coupe le texte après 2 lignes */
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 4px;
        }

        .video-channel {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .status-msg {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-secondary);
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>Rechercher sur YouTube</h1>
    
    <div class="search-container">
        <input type="text" id="video-query" placeholder="Entrez le nom de la vidéo...">
        <button onclick="searchVideo()">Rechercher</button>
    </div>

    <!-- Le lecteur s'affiche ici tout en haut quand on clique sur une vidéo -->
    <div id="video-container"></div>

    <!-- Les résultats s'affichent sous forme de jolies cartes miniatures -->
    <div id="results"></div>

    <script>
        const API_KEY = "AIzaSyCGjzaB5AeXvH5Xbx4QCiZsImKsmXGxu2M"; // Met ta clé API ici

        // Permet de lancer la recherche en appuyant sur la touche "Entrée"
        document.getElementById('video-query').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchVideo();
        });

        async function searchVideo() {
            const query = document.getElementById('video-query').value.trim();
            const resultsContainer = document.getElementById('results');

            if (!query) {
                resultsContainer.innerHTML = "<p class='status-msg'>Veuillez entrer un mot-clé.</p>";
                return;
            }

            resultsContainer.innerHTML = "<p class='status-msg'>Recherche en cours...</p>";

            try {
                // Utilisation de la miniature moyenne (medium) pour une meilleure qualité visuelle
                const response = await fetch(
                    `https://www.googleapis.com/v3/search?part=snippet&q=${encodeURIComponent(query)}&type=video&maxResults=8&key=${API_KEY}`
                );
                const data = await response.json();

                if (data.items && data.items.length > 0) {
                    resultsContainer.innerHTML = ""; // On nettoie les anciens résultats
                    
                    data.items.forEach(item => {
                        const videoId = item.id.videoId;
                        const title = item.snippet.title;
                        const channelTitle = item.snippet.channelTitle;
                        // On prend l'image 'medium' pour éviter que ce soit flou
                        const thumbnail = item.snippet.thumbnails.medium ? item.snippet.thumbnails.medium.url : item.snippet.thumbnails.default.url;

                        const resultElement = document.createElement('div');
                        resultElement.className = 'video-result';
                        resultElement.innerHTML = `
                            <img src="${thumbnail}" alt="${title}">
                            <div class="video-info">
                                <div class="video-title" title="${title}">${title}</div>
                                <div class="video-channel">${channelTitle}</div>
                            </div>
                        `;
                        
                        resultElement.onclick = () => {
                            loadVideo(videoId);
                            // Scroll automatique vers le lecteur pour une meilleure expérience
                            window.scrollTo({ top: 0, behavior: 'smooth' });
                        };
                        
                        resultsContainer.appendChild(resultElement);
                    });
                } else {
                    resultsContainer.innerHTML = "<p class='status-msg'>Aucune vidéo trouvée.</p>";
                }
            } catch (error) {
                resultsContainer.innerHTML = `<p class='status-msg' style='color: var(--yt-red);'>Erreur : ${error.message}</p>`;
            }
        }

        function loadVideo(videoId) {
            const videoContainer = document.getElementById('video-container');
            // Utilisation d'un wrapper responsive 16:9 moderne
            videoContainer.innerHTML = `
                <div class="video-wrapper">
                    <iframe
                        src="https://www.youtube.com/embed/${videoId}?autoplay=1"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        allowfullscreen>
                     iframe>
                </div>
            `;
        }
    </script>
</body>
</html>
