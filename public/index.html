<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recherche Vidéo YouTube</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #0f0f0f;
            --text-secondary: #606060;
            --yt-red: #ff0000;
            --yt-red-hover: #cc0000;
            --border-light: #e5e5e5;
            --bg-search: #f8f8f8;
        }

        body {
            font-family: 'Roboto', 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 1.8rem;
            color: var(--yt-red);
            font-weight: 700;
            margin-bottom: 20px;
        }

        /* Zone de recherche globale */
        #search-zone {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .search-bar {
            display: flex;
            width: 100%;
            border: 1px solid var(--border-light);
            border-radius: 40px;
            overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
        }

        input {
            flex: 1;
            padding: 14px 24px;
            background: transparent;
            border: none;
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
        }

        .search-btn {
            padding: 0 28px;
            background-color: var(--bg-search);
            color: var(--text-color);
            border: none;
            border-left: 1px solid var(--border-light);
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }

        .search-btn:hover {
            background-color: #ededed;
        }

        /* Résultats de recherche style "Liste YouTube officielle" */
        #results {
            width: 100%;
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .video-result {
            display: flex;
            gap: 16px;
            padding: 12px;
            border-bottom: 1px solid var(--border-light);
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            border-radius: 8px;
        }

        .video-result:hover {
            background-color: #fafafa;
            transform: translateY(-2px);
        }

        .video-result img {
            width: 240px;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            border-radius: 8px;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .video-info {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding-top: 4px;
        }

        .video-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-color);
            line-height: 1.4rem;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-channel {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 8px;
        }

        .video-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Vue Lecteur (Cachée par défaut) */
        #player-zone {
            display: none; /* Changé dynamiquement en JS */
            width: 100%;
            max-width: 900px;
            flex-direction: column;
            align-items: flex-start;
            animation: fadeIn 0.4s ease;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            padding: 10px 20px;
            background-color: var(--yt-red);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background-color: var(--yt-red-hover);
        }

        #video-container {
            width: 100%;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Ratio 16:9 obligatoire */
            height: 0;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            background: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .status-msg {
            text-align: center;
            color: var(--text-secondary);
            font-style: italic;
            margin-top: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Adaptations Mobiles */
        @media (max-width: 600px) {
            .video-result {
                flex-direction: column;
            }
            .video-result img {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- ZONE DE RECHERCHE -->
    <div id="search-zone">
        <h1>Rechercher une vidéo</h1>
        <div class="search-bar">
            <input type="text" id="video-query" placeholder="Saisissez votre recherche...">
            <button class="search-btn" onclick="searchVideo()">Rechercher</button>
        </div>
        <div id="results"></div>
    </div>

    <!-- ZONE LECTEUR (Masquée au début) -->
    <div id="player-zone">
        <button class="back-btn" onclick="closeVideo()">← Retour à la recherche</button>
        <div id="video-container"></div>
    </div>

    <script>
        document.getElementById('video-query').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchVideo();
        });

        async function searchVideo() {
            const query = document.getElementById('video-query').value.trim();
            const resultsContainer = document.getElementById('results');

            if (!query) {
                resultsContainer.innerHTML = "<p class='status-msg'>Veuillez saisir un mot-clé.</p>";
                return;
            }

            resultsContainer.innerHTML = "<p class='status-msg'>Recherche en cours...</p>";

            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();

                if (data.items && data.items.length > 0) {
                    resultsContainer.innerHTML = "";
                    
                    data.items.forEach(item => {
                        const videoId = item.id.videoId;
                        // Si l'élément n'a pas de videoId (ex: une chaîne ou playlist), on l'ignore
                        if (!videoId) return;

                        const title = item.snippet.title;
                        const channelTitle = item.snippet.channelTitle;
                        const description = item.snippet.description || "Aucune description.";
                        const thumbnail = item.snippet.thumbnails.medium ? item.snippet.thumbnails.medium.url : item.snippet.thumbnails.default.url;

                        const resultElement = document.createElement('div');
                        resultElement.className = 'video-result';
                        resultElement.innerHTML = `
                            <img src="${thumbnail}" alt="${title}">
                            <div class="video-info">
                                <div class="video-title" title="${title}">${title}</div>
                                <div class="video-channel">${channelTitle}</div>
                                <div class="video-desc">${description}</div>
                            </div>
                        `;
                        
                        resultElement.onclick = () => loadVideo(videoId);
                        resultsContainer.appendChild(resultElement);
                    });
                } else {
                    resultsContainer.innerHTML = "<p class='status-msg'>Aucune vidéo trouvée.</p>";
                }
            } catch (error) {
                resultsContainer.innerHTML = `<p class='status-msg' style='color: var(--yt-red);'>Erreur : ${error.message}</p>`;
            }
        }

        function loadVideo(videoId) {
            // Étape 1 : Masquer proprement la recherche et afficher le bloc du joueur
            document.getElementById('search-zone').style.display = 'none';
            document.getElementById('player-zone').style.display = 'flex';

            // Étape 2 : Injecter l'iframe à l'intérieur du wrapper responsive
            const videoContainer = document.getElementById('video-container');
            videoContainer.innerHTML = `
                <div class="video-wrapper">
                    <iframe
                        src="https://www.youtube.com/embed/${videoId}?autoplay=1"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        allowfullscreen>
                    </iframe>
                </div>
            `;
            
            // Remonte l'écran en haut de page pour le confort visuel
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function closeVideo() {
            // Étape 1 : Cacher le lecteur et vider l'iframe pour stopper net le son
            document.getElementById('player-zone').style.display = 'none';
            document.getElementById('video-container').innerHTML = ''; 

            // Étape 2 : Réafficher la zone de recherche (Correction de la coquille ici)
            document.getElementById('search-zone').style.display = 'flex';
        }
    </script>
</body>
</html>
